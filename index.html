<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intervals Pro</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --card-bg: #ffffff;
            --work-bg: #e3f2fd;
            --rest-bg: #e8f5e9;
            --warmup-bg: #fff8e1;
            --cooldown-bg: #e0f7fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 1rem 2rem;
        }

        /* --- SPLASH SCREEN --- */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .splash-screen h1 {
            color: #ff3b30; /* Rojo vibrante estilo Apple */
            font-style: italic;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .splash-hidden {
            opacity: 0;
            visibility: hidden;
        }
        /* --------------------- */

        .main-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .card-content {
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
        }

        /* Modo Concentración */
        body.app-active { padding: 0; }
        body.app-active .main-card {
            background: transparent;
            box-shadow: none;
            max-width: 100%;
            border-radius: 0;
            height: 100vh;
        }
        body.app-active .card-content { justify-content: center; padding: 2rem; }
        body.app-active .edit-section, body.app-active #notesDivider { display: none; }
        body.app-active .time-display { font-size: 7rem; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.5rem;
        }

        .sound-toggle {
            background: rgba(0,0,0,0.06);
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-color);
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
        }

        .timer-hero {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .time-display {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            margin: 0.8rem 0;
            transition: all 0.4s ease;
        }

        .phase-label {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        .set-counter {
            font-size: 1rem;
            color: #86868b;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .controls-main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1rem;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 1.1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.97); }
        .btn-start { background: var(--accent-color); color: white; }
        .btn-reset { background: #e5e5ea; color: var(--text-color); }

        .divider { height: 1px; background: #e5e5ea; margin: 0.5rem 0; border-radius: 1px; }

        .edit-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }

        .phase-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
            width: 100%;
        }

        .phase-row input[type="text"] {
            flex: 1;
            min-width: 0;
        }

        .phase-row input[type="number"], .special-row input[type="number"] {
            width: 70px;
            flex-shrink: 0;
            text-align: center;
        }

        .btn-icon-del {
            width: 30px;
            flex-shrink: 0;
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input {
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 0.95rem;
            background: #fbfbfd;
            padding: 0.8rem;
        }
        
        input:focus { outline: 2px solid var(--accent-color); border-color: transparent; }

        .special-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .btn-add {
            background: transparent;
            border: 2px dashed #d2d2d7;
            color: var(--accent-color);
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .saved-routines {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .routine-chip {
            background: #f5f5f7;
            padding: 0.6rem 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid #d2d2d7;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .routine-chip span:first-child { cursor: pointer; }
        .delete-x { color: #ff3b30; font-weight: bold; font-size: 1.1rem; cursor: pointer; padding-left: 4px; }

        .notes-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .btn-notes-toggle {
            display: none;
            background: rgba(0,0,0,0.06);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-color);
            cursor: pointer;
            letter-spacing: 0.05em;
        }

        body.app-active .btn-notes-toggle {
            display: block;
        }

        body.notes-hidden .notes-area {
            display: none;
        }

        .notes-area {
            width: 100%;
            height: 120px;
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid #d2d2d7;
            background: #fbfbfd;
            font-size: 0.95rem;
            resize: none;
            transition: opacity 0.3s ease;
        }

        h2 { font-size: 1.1rem; opacity: 0.9; font-weight: 600;}
    </style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
    <h1>Intervals</h1>
</div>

<div class="main-card" id="mainCard">
    <div class="card-content">
        
        <div class="header">
            <h1 style="font-weight: 700; font-size: 1.1rem; letter-spacing: 0.05em;">INTERVALS</h1>
            <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">SOUND</button>
        </div>

        <div class="timer-hero" id="heroCard">
            <div class="set-counter" id="roundCounterContainer">Round <span id="currentSet">1</span> / <span id="totalSetsDisp">8</span></div>
            <div class="time-display" id="timeDisplay">00:00</div>
            <div class="phase-label" id="phaseDisplay">READY</div>
        </div>

        <div class="controls-main">
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
        </div>

        <div id="editSection" class="edit-section">
            <div class="divider"></div>
            
            <div>
                <h2>Interval Settings</h2>
                
                <div class="special-row">
                    <span>Warm Up (min)</span>
                    <input type="number" id="warmUpTime" value="5" min="0" onchange="updateUI()">
                </div>

                <div id="phasesContainer" style="margin-top: 0.5rem;"></div>
                <button class="btn-add" onclick="addPhase()" style="width: 100%;">+ Add Phase</button>

                <div class="special-row" style="margin-top: 0.5rem;">
                    <span>Total Rounds</span>
                    <input type="number" id="sets" value="8" min="1" onchange="updateUI()">
                </div>

                <div class="special-row">
                    <span>Cool Down (min)</span>
                    <input type="number" id="coolDownTime" value="0" min="0" onchange="updateUI()">
                </div>

                <button class="btn-reset" style="background: #34c759; color: white; margin-top: 1rem; width: 100%;" onclick="saveRoutine()">Save this routine</button>
                <div id="routineList" class="saved-routines"></div>
            </div>
        </div>

        <div class="divider" id="notesDivider"></div>

        <div class="notes-wrapper">
            <div class="notes-header">
                <h2>Notes</h2>
                <button class="btn-notes-toggle" id="notesToggleBtn" onclick="toggleNotesVisibility()">HIDE</button>
            </div>
            <textarea id="notepad" class="notes-area" placeholder="Jot down your workout details..."></textarea>
        </div>

    </div>
</div>

<script>
    // --- Lógica del Splash Screen ---
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splashScreen').classList.add('splash-hidden');
        }, 1200); // 1.2 segundos de pantalla de carga
    });

    let isRunning = false;
    let timerInterval;
    let timeLeft;
    let currentSet = 1;
    let currentPhaseIndex = 0;
    let currentState = 'READY'; 
    let soundEnabled = true;
    let isNotesHidden = false;
    let phases = [{ name: "Phase 1", time: 1 }, { name: "Phase 2", time: 2 }];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const timeDisplay = document.getElementById('timeDisplay');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const startBtn = document.getElementById('startBtn');
    const notepad = document.getElementById('notepad');
    const roundCounterContainer = document.getElementById('roundCounterContainer');

    if(localStorage.getItem('notes')) notepad.value = localStorage.getItem('notes');
    notepad.addEventListener('input', () => localStorage.setItem('notes', notepad.value));

    function toggleNotesVisibility() {
        isNotesHidden = !isNotesHidden;
        const btn = document.getElementById('notesToggleBtn');
        if (isNotesHidden) {
            document.body.classList.add('notes-hidden');
            btn.innerText = 'SHOW';
        } else {
            document.body.classList.remove('notes-hidden');
            btn.innerText = 'HIDE';
        }
    }

    function renderPhaseInputs() {
        const container = document.getElementById('phasesContainer');
        container.innerHTML = '';
        phases.forEach((p, index) => {
            const row = document.createElement('div');
            row.className = 'phase-row';
            row.innerHTML = `
                <input type="text" value="${p.name}" placeholder="Phase ${index+1}" oninput="phases[${index}].name = this.value; if(!isRunning && currentState === 'CIRCUIT' && currentPhaseIndex === ${index}) updateUI();">
                <input type="number" value="${p.time}" min="1" oninput="phases[${index}].time = parseInt(this.value) || 0; if(!isRunning && currentState === 'CIRCUIT' && currentPhaseIndex === ${index}) renderTime();">
                ${phases.length > 1 ? `<button class="btn-icon-del" onclick="removePhase(${index})">&times;</button>` : '<div style="width: 30px;"></div>'}
            `;
            container.appendChild(row);
        });
    }

    function addPhase() {
        phases.push({ name: `Phase ${phases.length + 1}`, time: 1 });
        renderPhaseInputs();
        resetTimer();
    }

    function removePhase(index) {
        phases.splice(index, 1);
        renderPhaseInputs();
        resetTimer();
    }
    
    function loadSavedRoutines() {
        const routines = JSON.parse(localStorage.getItem('myDynamicRoutines') || '[]');
        const container = document.getElementById('routineList');
        container.innerHTML = '';
        routines.forEach((r, index) => {
            const chip = document.createElement('div');
            chip.className = 'routine-chip';
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = r.name;
            nameSpan.onclick = () => applyRoutine(r);
            
            const delX = document.createElement('span');
            delX.innerHTML = '&times;';
            delX.className = 'delete-x';
            delX.onclick = (e) => {
                e.stopPropagation();
                if(confirm(`Delete "${r.name}"?`)) {
                    routines.splice(index, 1);
                    localStorage.setItem('myDynamicRoutines', JSON.stringify(routines));
                    loadSavedRoutines();
                }
            };
            
            chip.appendChild(nameSpan);
            chip.appendChild(delX);
            container.appendChild(chip);
        });
    }

    function saveRoutine() {
        const name = prompt("Routine name:");
        if (!name) return;
        const routines = JSON.parse(localStorage.getItem('myDynamicRoutines') || '[]');
        routines.push({ 
            name, 
            phasesData: JSON.parse(JSON.stringify(phases)), 
            sets: document.getElementById('sets').value,
            warmUp: document.getElementById('warmUpTime').value,
            coolDown: document.getElementById('coolDownTime').value
        });
        localStorage.setItem('myDynamicRoutines', JSON.stringify(routines));
        loadSavedRoutines();
    }

    function applyRoutine(r) {
        phases = r.phasesData.map(p => ({
            name: p.name,
            time: p.time !== undefined ? p.time : (p.min || 0)
        }));
        
        document.getElementById('sets').value = r.sets || 1;
        document.getElementById('warmUpTime').value = r.warmUp !== undefined ? r.warmUp : (r.wuMin || 0);
        document.getElementById('coolDownTime').value = r.coolDown !== undefined ? r.coolDown : (r.cdMin || 0);
        
        renderPhaseInputs();
        resetTimer();
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.getElementById('soundBtn').innerText = soundEnabled ? 'SOUND' : 'MUTE';
        document.getElementById('soundBtn').style.opacity = soundEnabled ? '1' : '0.5';
    }

    function playBeep() {
        if (!soundEnabled) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880; osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerInterval);
            startBtn.innerText = 'Resume'; startBtn.style.backgroundColor = '#34c759';
            isRunning = false;
        } else {
            if (currentState === 'READY') {
                document.body.classList.add('app-active');
                
                const wu = parseInt(document.getElementById('warmUpTime').value) || 0;
                if (wu > 0) {
                    currentState = 'WARMUP';
                    timeLeft = wu * 60;
                } else {
                    currentState = 'CIRCUIT';
                    currentSet = 1;
                    currentPhaseIndex = 0;
                    timeLeft = phases[0].time * 60;
                }
                updateUI();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) { playBeep(); switchPhase(); }
                renderTime();
            }, 1000);
            startBtn.innerText = 'Pause'; startBtn.style.backgroundColor = '#ff3b30';
            isRunning = true;
        }
    }

    function switchPhase() {
        const totalSets = parseInt(document.getElementById('sets').value);
        const cd = parseInt(document.getElementById('coolDownTime').value) || 0;

        if (currentState === 'WARMUP') {
            currentState = 'CIRCUIT';
            currentSet = 1;
            currentPhaseIndex = 0;
            timeLeft = phases[0].time * 60;
        } else if (currentState === 'CIRCUIT') {
            currentPhaseIndex++;
            if (currentPhaseIndex >= phases.length) {
                if (currentSet >= totalSets) {
                    if (cd > 0) {
                        currentState = 'COOLDOWN';
                        timeLeft = cd * 60;
                    } else {
                        finish();
                        return;
                    }
                } else {
                    currentSet++;
                    currentPhaseIndex = 0;
                    timeLeft = phases[currentPhaseIndex].time * 60;
                }
            } else {
                timeLeft = phases[currentPhaseIndex].time * 60;
            }
        } else if (currentState === 'COOLDOWN') {
            finish();
            return;
        }
        updateUI();
    }

    function updateUI() {
        const totalSets = document.getElementById('sets').value || 1;
        document.getElementById('currentSet').innerText = currentSet;
        document.getElementById('totalSetsDisp').innerText = totalSets;
        
        if (currentState === 'READY') {
            phaseDisplay.innerText = "READY";
            document.body.style.backgroundColor = "var(--bg-color)";
            roundCounterContainer.style.opacity = '1';
            phaseDisplay.style.color = "var(--accent-color)";
        } else if (currentState === 'WARMUP') {
            phaseDisplay.innerText = "WARM UP";
            phaseDisplay.style.color = "#d97706"; 
            document.body.style.backgroundColor = "var(--warmup-bg)";
            roundCounterContainer.style.opacity = '0'; 
        } else if (currentState === 'CIRCUIT') {
            phaseDisplay.innerText = phases[currentPhaseIndex] ? phases[currentPhaseIndex].name : "PHASE";
            phaseDisplay.style.color = "var(--accent-color)";
            document.body.style.backgroundColor = currentPhaseIndex % 2 === 0 ? "var(--work-bg)" : "var(--rest-bg)";
            roundCounterContainer.style.opacity = '1';
        } else if (currentState === 'COOLDOWN') {
            phaseDisplay.innerText = "COOL DOWN";
            phaseDisplay.style.color = "#0284c7"; 
            document.body.style.backgroundColor = "var(--cooldown-bg)";
            roundCounterContainer.style.opacity = '0'; 
        }
    }

    function renderTime() {
        let t = 0;
        if (timeLeft !== undefined) {
            t = timeLeft;
        } else {
            const wu = parseInt(document.getElementById('warmUpTime').value) || 0;
            t = wu > 0 ? wu * 60 : (phases[0] ? phases[0].time * 60 : 0);
        }
        
        const m = Math.floor(t / 60).toString().padStart(2, '0');
        const s = (t % 60).toString().padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}`;
    }

    function resetTimer() {
        clearInterval(timerInterval); 
        isRunning = false; 
        timeLeft = undefined;
        currentSet = 1; 
        currentPhaseIndex = 0;
        currentState = 'READY';
        
        document.body.classList.remove('app-active');
        
        renderTime(); 
        updateUI();
        
        startBtn.innerText = 'Start'; 
        startBtn.style.backgroundColor = 'var(--accent-color)';
    }

    function finish() {
        clearInterval(timerInterval); 
        playBeep(); setTimeout(playBeep, 400);
        
        currentState = 'READY';
        phaseDisplay.innerText = "DONE!"; 
        phaseDisplay.style.color = "var(--text-color)";
        document.body.style.backgroundColor = "var(--bg-color)";
        roundCounterContainer.style.opacity = '0';
        
        document.body.classList.remove('app-active');
        
        isRunning = false; 
        startBtn.innerText = 'Start'; 
        timeLeft = undefined;
    }

    renderPhaseInputs(); loadSavedRoutines(); resetTimer();
</script>
</body>
</html>
