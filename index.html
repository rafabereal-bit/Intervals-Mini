<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intervals Pro</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --card-bg: #ffffff;
            --work-bg: #e3f2fd;
            --rest-bg: #e8f5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 1rem 2rem;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0.5rem;
        }

        .sound-toggle {
            background: rgba(0,0,0,0.06);
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-color);
            cursor: pointer;
            letter-spacing: 0.05em;
        }

        .timer-hero {
            text-align: center;
            padding: 3rem 1rem;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 280px;
        }

        .time-display {
            font-size: 5.5rem; /* Tamaño optimizado */
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            margin: 0.8rem 0;
        }

        .phase-label {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .set-counter {
            font-size: 1rem;
            color: #86868b;
            font-weight: 500;
        }

        .controls-main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1rem;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 1.1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.97); }

        .btn-start { background: var(--accent-color); color: white; }
        .btn-reset { background: #e5e5ea; color: var(--text-color); }

        .section-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .phase-row {
            display: grid;
            grid-template-columns: 1fr 70px 30px;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .phase-row input {
            padding: 0.8rem;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 1rem;
        }

        .phase-row input[type="number"] { text-align: center; }

        .btn-icon-del {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add {
            background: transparent;
            border: 2px dashed #d2d2d7;
            color: var(--accent-color);
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .sets-row {
            display: grid;
            grid-template-columns: 1fr 80px;
            align-items: center;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f5f5f7;
        }
        
        .sets-row input {
            padding: 0.8rem;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
        }

        .saved-routines {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .routine-chip {
            background: #f5f5f7;
            padding: 0.6rem 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid #d2d2d7;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .routine-chip span:first-child { cursor: pointer; }

        .delete-x {
            color: #ff3b30;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            padding-left: 4px;
        }

        .notes-area {
            width: 100%;
            height: 140px;
            padding: 1.2rem;
            border-radius: 24px;
            border: none;
            background: var(--card-bg);
            font-size: 1rem;
            resize: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        h2 { font-size: 1.1rem; margin-bottom: 0.2rem; padding-left: 0.2rem; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="font-weight: 700; font-size: 1.1rem; letter-spacing: 0.05em;">INTERVALS</h1>
        <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">SOUND</button>
    </div>

    <div class="timer-hero" id="heroCard">
        <div class="set-counter">Round <span id="currentSet">1</span> / <span id="totalSetsDisp">8</span></div>
        <div class="time-display" id="timeDisplay">01:00</div>
        <div class="phase-label" id="phaseDisplay">READY</div>
    </div>

    <div class="controls-main">
        <button class="btn-reset" onclick="resetTimer()">Reset</button>
        <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
    </div>

    <div class="section-card">
        <h2>Customize Intervals</h2>
        <div id="phasesContainer"></div>
        <button class="btn-add" onclick="addPhase()">+ Add Phase</button>

        <div class="sets-row">
            <span style="font-weight: 500;">Total Rounds</span>
            <input type="number" id="sets" value="8" min="1" onchange="updateUI()">
        </div>

        <button class="btn-reset" style="background: #34c759; color: white; margin-top: 0.5rem;" onclick="saveRoutine()">Save routine</button>
        <div id="routineList" class="saved-routines"></div>
    </div>

    <div>
        <h2>Notes</h2>
        <textarea id="notepad" class="notes-area" placeholder="Notes..."></textarea>
    </div>
</div>

<script>
    let isRunning = false;
    let timerInterval;
    let timeLeft;
    let currentSet = 1;
    let currentPhaseIndex = 0;
    let soundEnabled = true;
    let phases = [{ name: "Phase 1", time: 1 }, { name: "Phase 2", time: 2 }];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const timeDisplay = document.getElementById('timeDisplay');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const startBtn = document.getElementById('startBtn');
    const notepad = document.getElementById('notepad');

    if(localStorage.getItem('notes')) notepad.value = localStorage.getItem('notes');
    notepad.addEventListener('input', () => localStorage.setItem('notes', notepad.value));

    function renderPhaseInputs() {
        const container = document.getElementById('phasesContainer');
        container.innerHTML = '';
        phases.forEach((p, index) => {
            const row = document.createElement('div');
            row.className = 'phase-row';
            row.innerHTML = `
                <input type="text" value="${p.name}" placeholder="Phase ${index+1}" oninput="phases[${index}].name = this.value; if(!isRunning && currentPhaseIndex === ${index}) updateUI();">
                <input type="number" value="${p.time}" min="1" oninput="phases[${index}].time = parseInt(this.value) || 0; if(!isRunning && currentPhaseIndex === ${index}) renderTime();">
                ${phases.length > 1 ? `<button class="btn-icon-del" onclick="removePhase(${index})">&times;</button>` : '<div></div>'}
            `;
            container.appendChild(row);
        });
    }

    function addPhase() {
        phases.push({ name: `Phase ${phases.length + 1}`, time: 1 });
        renderPhaseInputs();
        resetTimer();
    }

    function removePhase(index) {
        phases.splice(index, 1);
        renderPhaseInputs();
        resetTimer();
    }
    
    function loadSavedRoutines() {
        const routines = JSON.parse(localStorage.getItem('myDynamicRoutines') || '[]');
        const container = document.getElementById('routineList');
        container.innerHTML = '';
        routines.forEach((r, index) => {
            const chip = document.createElement('div');
            chip.className = 'routine-chip';
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = r.name;
            nameSpan.onclick = () => applyRoutine(r);
            
            const delX = document.createElement('span');
            delX.innerHTML = '&times;';
            delX.className = 'delete-x';
            delX.onclick = (e) => {
                e.stopPropagation();
                if(confirm(`Delete "${r.name}"?`)) {
                    routines.splice(index, 1);
                    localStorage.setItem('myDynamicRoutines', JSON.stringify(routines));
                    loadSavedRoutines();
                }
            };
            
            chip.appendChild(nameSpan);
            chip.appendChild(delX);
            container.appendChild(chip);
        });
    }

    function saveRoutine() {
        const name = prompt("Routine name:");
        if (!name) return;
        const routines = JSON.parse(localStorage.getItem('myDynamicRoutines') || '[]');
        routines.push({ name, phasesData: JSON.parse(JSON.stringify(phases)), sets: document.getElementById('sets').value });
        localStorage.setItem('myDynamicRoutines', JSON.stringify(routines));
        loadSavedRoutines();
    }

    function applyRoutine(r) {
        phases = JSON.parse(JSON.stringify(r.phasesData));
        document.getElementById('sets').value = r.sets;
        renderPhaseInputs();
        resetTimer();
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.getElementById('soundBtn').innerText = soundEnabled ? 'SOUND' : 'MUTE';
        document.getElementById('soundBtn').style.opacity = soundEnabled ? '1' : '0.5';
    }

    function playBeep() {
        if (!soundEnabled) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880; osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerInterval);
            startBtn.innerText = 'Resume'; startBtn.style.backgroundColor = '#34c759';
            isRunning = false;
        } else {
            if (timeLeft === undefined) { timeLeft = phases[currentPhaseIndex].time * 60; updateUI(); }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) { playBeep(); switchPhase(); }
                renderTime();
            }, 1000);
            startBtn.innerText = 'Pause'; startBtn.style.backgroundColor = '#ff3b30';
            isRunning = true;
        }
    }

    function switchPhase() {
        currentPhaseIndex++;
        if (currentPhaseIndex >= phases.length) {
            const totalSets = parseInt(document.getElementById('sets').value);
            if (currentSet >= totalSets) { finish(); return; }
            currentSet++; currentPhaseIndex = 0;
        }
        timeLeft = phases[currentPhaseIndex].time * 60;
        updateUI();
    }

    function updateUI() {
        const totalSets = document.getElementById('sets').value || 1;
        document.getElementById('currentSet').innerText = currentSet;
        document.getElementById('totalSetsDisp').innerText = totalSets;
        if (phases[currentPhaseIndex]) {
            phaseDisplay.innerText = phases[currentPhaseIndex].name;
            document.body.style.backgroundColor = currentPhaseIndex % 2 === 0 ? "var(--work-bg)" : "var(--rest-bg)";
        }
    }

    function renderTime() {
        let t = timeLeft !== undefined ? timeLeft : (phases[0] ? phases[0].time * 60 : 0);
        const m = Math.floor(t / 60).toString().padStart(2, '0');
        const s = (t % 60).toString().padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}`;
    }

    function resetTimer() {
        clearInterval(timerInterval); isRunning = false; timeLeft = undefined;
        currentSet = 1; currentPhaseIndex = 0;
        renderTime(); phaseDisplay.innerText = "READY";
        document.body.style.backgroundColor = "var(--bg-color)";
        startBtn.innerText = 'Start'; startBtn.style.backgroundColor = 'var(--accent-color)';
        updateUI();
    }

    function finish() {
        clearInterval(timerInterval); playBeep(); setTimeout(playBeep, 400);
        phaseDisplay.innerText = "DONE!"; document.body.style.backgroundColor = "var(--bg-color)";
        isRunning = false; startBtn.innerText = 'Start'; timeLeft = undefined;
    }

    renderPhaseInputs(); loadSavedRoutines(); resetTimer();
</script>
</body>
</html>
