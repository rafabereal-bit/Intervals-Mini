<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intervals Pro</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --card-bg: #ffffff;
            --work-bg: #e3f2fd;
            --rest-bg: #e8f5e9;
            --warmup-bg: #fff8e1;
            --cooldown-bg: #e0f7fa;
            --input-bg: #fbfbfd;
            --border-color: #d2d2d7;
            --btn-bg: rgba(0,0,0,0.06);
        }

        /* --- VARIABLES MODO OSCURO --- */
        body.dark-mode {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --accent-color: #0a84ff;
            --card-bg: #1c1c1e;
            --work-bg: #0c2b4a; /* Azul oscuro profundo */
            --rest-bg: #0d3616; /* Verde oscuro profundo */
            --warmup-bg: #3d2300; /* Naranja/café profundo */
            --cooldown-bg: #002d3f; /* Cyan oscuro */
            --input-bg: #2c2c2e;
            --border-color: #38383a;
            --btn-bg: rgba(255,255,255,0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 1rem 2rem;
        }

        /* --- SPLASH SCREEN --- */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .splash-screen h1 {
            color: #ff3b30;
            font-style: italic;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 0.2rem;
        }

        .splash-screen p {
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .splash-signature {
            position: absolute;
            bottom: 2.5rem;
            color: #86868b;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .splash-hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* --- MAIN CARD --- */
        .main-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
            overflow: hidden;
        }

        body.dark-mode .main-card {
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .card-content {
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
        }

        /* --- MODO CONCENTRACIÓN --- */
        body.app-active {
            padding: 0;
        }

        body.app-active .main-card {
            background: transparent;
            box-shadow: none;
            max-width: 100%;
            border-radius: 0;
            height: 100vh;
        }

        body.app-active .card-content {
            justify-content: center;
            padding: 2rem;
        }

        body.app-active .edit-section, 
        body.app-active #notesDivider,
        body.app-active .donate-container {
            display: none;
        }

        body.app-active .time-display {
            font-size: 7rem;
        }

        /* --- HEADER Y BOTONES SUPERIORES --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.5rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon-btn, .sound-toggle {
            background: var(--btn-bg);
            border: none;
            border-radius: 12px;
            color: var(--text-color);
            cursor: pointer;
            transition: opacity 0.2s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            font-size: 1rem;
        }

        .sound-toggle {
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            height: 34px;
        }

        /* --- RELOJ Y TEXTOS --- */
        .timer-hero {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .time-display {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            margin: 0.8rem 0;
            transition: all 0.4s ease;
        }

        .phase-label {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        .set-counter {
            font-size: 1rem;
            color: #86868b;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        /* --- CONTROLES PRINCIPALES --- */
        .controls-main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1rem;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 1.1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-start {
            background: var(--accent-color);
            color: white;
        }

        .btn-reset {
            background: var(--btn-bg);
            color: var(--text-color);
        }

        .divider {
            height: 1px;
            background: var(--border-color);
            margin: 0.5rem 0;
            border-radius: 1px;
            opacity: 0.6;
        }

        /* --- SECCIÓN DE EDICIÓN --- */
        .edit-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }

        .phase-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
            width: 100%;
        }

        .phase-row input[type="text"] {
            flex: 1;
            min-width: 0;
        }

        .phase-row input[type="number"], 
        .special-row input[type="number"] {
            width: 70px;
            flex-shrink: 0;
            text-align: center;
        }

        .btn-icon-del {
            width: 30px;
            flex-shrink: 0;
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input, textarea {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            background: var(--input-bg);
            padding: 0.8rem;
            color: var(--text-color);
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: 2px solid var(--accent-color);
            border-color: transparent;
        }

        .special-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .btn-add {
            background: transparent;
            border: 2px dashed var(--border-color);
            color: var(--accent-color);
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        /* --- RUTINAS --- */
        .saved-routines {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .routine-chip {
            background: var(--input-bg);
            padding: 0.6rem 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--text-color);
        }

        .routine-chip span:first-child {
            cursor: pointer;
        }

        .delete-x {
            color: #ff3b30;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            padding-left: 4px;
        }

        /* --- NOTAS Y DONACIONES --- */
        .notes-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .btn-notes-toggle {
            display: none;
            background: var(--btn-bg);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-color);
            cursor: pointer;
            letter-spacing: 0.05em;
        }

        body.app-active .btn-notes-toggle {
            display: block;
        }

        body.notes-hidden .notes-area {
            display: none;
        }

        .notes-area {
            width: 100%;
            height: 120px;
            resize: none;
        }

        h2 {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 600;
        }

        .donate-container {
            text-align: center;
            margin-top: 1rem;
            padding-bottom: 0.5rem;
        }

        .donate-link {
            display: inline-block;
            color: var(--text-color);
            opacity: 0.5;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: opacity 0.2s;
        }

        .donate-link:hover {
            opacity: 1;
        }

    </style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
    <h1>Intervals</h1>
    <p>Train smart. Track every interval.</p> 
    <span class="splash-signature">by rafa cano</span>
</div>

<div class="main-card" id="mainCard">
    <div class="card-content">
        
        <div class="header">
            <h1 style="font-weight: 700; font-size: 1.1rem; letter-spacing: 0.05em;">INTERVALS</h1>
            <div class="header-controls">
                <button class="icon-btn" id="darkModeBtn" onclick="toggleDarkMode()">🌙</button>
                <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">SOUND</button>
            </div>
        </div>

        <div class="timer-hero" id="heroCard">
            <div class="set-counter" id="roundCounterContainer">Round <span id="currentSet">1</span> / <span id="totalSetsDisp">8</span></div>
            <div class="time-display" id="timeDisplay">00:00</div>
            <div class="phase-label" id="phaseDisplay">READY</div>
        </div>

        <div class="controls-main">
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
        </div>

        <div id="editSection" class="edit-section">
            <div class="divider"></div>
            
            <div>
                <h2>Interval Settings</h2>
                
                <div class="special-row">
                    <span>Warm Up (min)</span>
                    <input type="number" id="warmUpTime" value="5" min="0" onchange="updateUI()">
                </div>

                <div id="phasesContainer" style="margin-top: 0.5rem;"></div>
                
                <button class="btn-add" onclick="addPhase()" style="width: 100%;">+ Add Phase</button>

                <div class="special-row" style="margin-top: 0.5rem;">
                    <span>Total Rounds</span>
                    <input type="number" id="sets" value="8" min="1" onchange="updateUI()">
                </div>

                <div class="special-row">
                    <span>Cool Down (min)</span>
                    <input type="number" id="coolDownTime" value="0" min="0" onchange="updateUI()">
                </div>

                <button class="btn-reset" style="background: #34c759; color: white; margin-top: 1rem; width: 100%;" onclick="saveRoutine()">Save this routine</button>
                
                <div id="routineList" class="saved-routines"></div>
            </div>
        </div>

        <div class="divider" id="notesDivider"></div>

        <div class="notes-wrapper">
            <div class="notes-header">
                <h2>Notes</h2>
                <button class="btn-notes-toggle" id="notesToggleBtn" onclick="toggleNotesVisibility()">HIDE</button>
            </div>
            <textarea id="notepad" class="notes-area" placeholder="Jot down your workout details..."></textarea>
        </div>

        <div class="donate-container">
            <a href="https://ko-fi.com/rafacano" target="_blank" class="donate-link">☕ Support the app</a>
        </div>

    </div>
</div>

<script>
    // --- Lógica del Modo Oscuro ---
    let isDarkMode = localStorage.getItem('darkMode') === 'true';

    function applyDarkMode() {
        const btn = document.getElementById('darkModeBtn');
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
            btn.innerText = '☀️';
        } else {
            document.body.classList.remove('dark-mode');
            btn.innerText = '🌙';
        }
    }

    function toggleDarkMode() {
        isDarkMode = !isDarkMode;
        localStorage.setItem('darkMode', isDarkMode);
        applyDarkMode();
    }

    // --- Lógica del Splash Screen ---
    window.addEventListener('load', () => {
        applyDarkMode(); // Aplicar tema al cargar
        setTimeout(() => {
            document.getElementById('splashScreen').classList.add('splash-hidden');
        }, 1200); 
    });

    // --- Variables de Estado ---
    let isRunning = false;
    let timerInterval;
    let timeLeft;
    let currentSet = 1;
    let currentPhaseIndex = 0;
    let currentState = 'READY'; 
    let soundEnabled = true;
    let isNotesHidden = false;
    let phases = [
        { name: "Phase 1", time: 1 }, 
        { name: "Phase 2", time: 2 }
    ];
    
    let wakeLock = null;

    // --- Elementos del DOM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const timeDisplay = document.getElementById('timeDisplay');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const startBtn = document.getElementById('startBtn');
    const notepad = document.getElementById('notepad');
    const roundCounterContainer = document.getElementById('roundCounterContainer');

    // Inicializar Notas Guardadas
    if(localStorage.getItem('notes')) {
        notepad.value = localStorage.getItem('notes');
    }
    
    notepad.addEventListener('input', () => {
        localStorage.setItem('notes', notepad.value);
    });

    // --- Funciones Wake Lock ---
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {
            console.log(`Wake Lock error: ${err.name}, ${err.message}`);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { 
                wakeLock = null; 
            });
        }
    }

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && isRunning) {
            await requestWakeLock();
        }
    });

    // --- Funciones de Interfaz ---
    function toggleNotesVisibility() {
        isNotesHidden = !isNotesHidden;
        const btn = document.getElementById('notesToggleBtn');
        
        if (isNotesHidden) {
            document.body.classList.add('notes-hidden');
            btn.innerText = 'SHOW';
        } else {
            document.body.classList.remove('notes-hidden');
            btn.innerText = 'HIDE';
        }
    }

    function renderPhaseInputs() {
        const container = document.getElementById('phasesContainer');
        container.innerHTML = '';
        
        phases.forEach((p, index) => {
            const row = document.createElement('div');
            row.className = 'phase-row';
            
            let deleteBtnHTML = '';
            if (phases.length > 1) {
                deleteBtnHTML = `<button class="btn-icon-del" onclick="removePhase(${index})">&times;</button>`;
            } else {
                deleteBtnHTML = `<div style="width: 30px;"></div>`;
            }

            row.innerHTML = `
                <input type="text" value="${p.name}" placeholder="Phase ${index+1}" oninput="phases[${index}].name = this.value; if(!isRunning && currentState === 'CIRCUIT' && currentPhaseIndex === ${index}) updateUI();">
                <input type="number" value="${p.time}" min="1" oninput="phases[${index}].time = parseInt(this.value) || 0; if(!isRunning && currentState === 'CIRCUIT' && currentPhaseIndex === ${index}) renderTime();">
                ${deleteBtnHTML}
            `;
            
            container.appendChild(row);
        });
    }

    function addPhase() {
        phases.push({ 
            name: `Phase ${phases.length + 1}`, 
            time: 1 
        });
        renderPhaseInputs();
        resetTimer();
    }

    function removePhase(index) {
        phases.splice(index, 1);
        renderPhaseInputs();
        resetTimer();
    }
    
    // --- Gestión de Rutinas Guardadas ---
    function loadSavedRoutines() {
        const routines = JSON.parse(localStorage.getItem('myDynamicRoutines') || '[]');
        const container = document.getElementById('routineList');
        container.innerHTML = '';
        
        routines.forEach((r, index) => {
            const chip = document.createElement('div');
            chip.className = 'routine-chip';
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = r.name;
            nameSpan.onclick = () => applyRoutine(r);
            
            const delX = document.createElement('span');
            delX.innerHTML = '&times;';
            delX.className = 'delete-x';
            
            delX.onclick = (e) => {
                e.stopPropagation();
                if(confirm(`Delete "${r.name}"?`)) {
                    routines.splice(index, 1);
                    localStorage.setItem('myDynamicRoutines', JSON.stringify(routines));
                    loadSavedRoutines();
                }
            };
            
            chip.appendChild(nameSpan);
            chip.appendChild(delX);
            container.appendChild(chip);
        });
    }

    function saveRoutine() {
        const name = prompt("Routine name:");
        if (!name) return;
        
        const routines = JSON.parse(localStorage.getItem('myDynamicRoutines') || '[]');
        
        routines.push({ 
            name: name, 
            phasesData: JSON.parse(JSON.stringify(phases)), 
            sets: document.getElementById('sets').value,
            warmUp: document.getElementById('warmUpTime').value,
            coolDown: document.getElementById('coolDownTime').value
        });
        
        localStorage.setItem('myDynamicRoutines', JSON.stringify(routines));
        loadSavedRoutines();
    }

    function applyRoutine(r) {
        phases = r.phasesData.map(p => ({
            name: p.name,
            time: p.time !== undefined ? p.time : (p.min || 0)
        }));
        
        document.getElementById('sets').value = r.sets || 1;
        document.getElementById('warmUpTime').value = r.warmUp !== undefined ? r.warmUp : (r.wuMin || 0);
        document.getElementById('coolDownTime').value = r.coolDown !== undefined ? r.coolDown : (r.cdMin || 0);
        
        renderPhaseInputs();
        resetTimer();
    }

    // --- Funciones de Audio ---
    function toggleSound() {
        soundEnabled = !soundEnabled;
        const soundBtnElement = document.getElementById('soundBtn');
        
        soundBtnElement.innerText = soundEnabled ? 'SOUND' : 'MUTE';
        soundBtnElement.style.opacity = soundEnabled ? '1' : '0.5';
    }

    function playBeep() {
        if (!soundEnabled) return;
        
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain); 
        gain.connect(audioCtx.destination);
        
        osc.frequency.value = 880; 
        osc.start(); 
        osc.stop(audioCtx.currentTime + 0.3);
    }

    // --- Lógica Principal del Temporizador ---
    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerInterval);
            startBtn.innerText = 'Resume'; 
            startBtn.style.backgroundColor = '#34c759'; 
            isRunning = false;
            releaseWakeLock();
        } else {
            if (currentState === 'READY') {
                document.body.classList.add('app-active');
                
                const wu = parseInt(document.getElementById('warmUpTime').value) || 0;
                
                if (wu > 0) {
                    currentState = 'WARMUP';
                    timeLeft = wu * 60;
                } else {
                    currentState = 'CIRCUIT';
                    currentSet = 1;
                    currentPhaseIndex = 0;
                    timeLeft = phases[0].time * 60;
                }
                updateUI();
            }
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            requestWakeLock();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) { 
                    playBeep(); 
                    switchPhase(); 
                }
                renderTime();
            }, 1000);
            
            startBtn.innerText = 'Pause'; 
            startBtn.style.backgroundColor = '#ff3b30'; 
            isRunning = true;
        }
    }

    function switchPhase() {
        const totalSets = parseInt(document.getElementById('sets').value);
        const cd = parseInt(document.getElementById('coolDownTime').value) || 0;

        if (currentState === 'WARMUP') {
            currentState = 'CIRCUIT';
            currentSet = 1;
            currentPhaseIndex = 0;
            timeLeft = phases[0].time * 60;
        } 
        else if (currentState === 'CIRCUIT') {
            currentPhaseIndex++;
            
            if (currentPhaseIndex >= phases.length) {
                if (currentSet >= totalSets) {
                    if (cd > 0) {
                        currentState = 'COOLDOWN';
                        timeLeft = cd * 60;
                    } else {
                        finish();
                        return;
                    }
                } else {
                    currentSet++;
                    currentPhaseIndex = 0;
                    timeLeft = phases[currentPhaseIndex].time * 60;
                }
            } else {
                timeLeft = phases[currentPhaseIndex].time * 60;
            }
        } 
        else if (currentState === 'COOLDOWN') {
            finish();
            return;
        }
        
        updateUI();
    }

    function updateUI() {
        const totalSets = document.getElementById('sets').value || 1;
        document.getElementById('currentSet').innerText = currentSet;
        document.getElementById('totalSetsDisp').innerText = totalSets;
        
        // El color del fondo cambia dependiendo de si estamos en modo oscuro o claro
        if (currentState === 'READY') {
            phaseDisplay.innerText = "READY";
            document.body.style.backgroundColor = "var(--bg-color)";
            roundCounterContainer.style.opacity = '1';
            phaseDisplay.style.color = "var(--accent-color)";
        } 
        else if (currentState === 'WARMUP') {
            phaseDisplay.innerText = "WARM UP";
            phaseDisplay.style.color = "#d97706"; 
            document.body.style.backgroundColor = "var(--warmup-bg)";
            roundCounterContainer.style.opacity = '0'; 
        } 
        else if (currentState === 'CIRCUIT') {
            phaseDisplay.innerText = phases[currentPhaseIndex] ? phases[currentPhaseIndex].name : "PHASE";
            phaseDisplay.style.color = "var(--accent-color)";
            
            if (currentPhaseIndex % 2 === 0) {
                document.body.style.backgroundColor = "var(--work-bg)";
            } else {
                document.body.style.backgroundColor = "var(--rest-bg)";
            }
            
            roundCounterContainer.style.opacity = '1';
        } 
        else if (currentState === 'COOLDOWN') {
            phaseDisplay.innerText = "COOL DOWN";
            phaseDisplay.style.color = "#0284c7"; 
            document.body.style.backgroundColor = "var(--cooldown-bg)";
            roundCounterContainer.style.opacity = '0'; 
        }
    }

    function renderTime() {
        let t = 0;
        if (timeLeft !== undefined) {
            t = timeLeft;
        } else {
            const wu = parseInt(document.getElementById('warmUpTime').value) || 0;
            if (wu > 0) {
                t = wu * 60;
            } else {
                t = phases[0] ? phases[0].time * 60 : 0;
            }
        }
        
        const m = Math.floor(t / 60).toString().padStart(2, '0');
        const s = (t % 60).toString().padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}`;
    }

    function resetTimer() {
        clearInterval(timerInterval); 
        isRunning = false; 
        timeLeft = undefined;
        currentSet = 1; 
        currentPhaseIndex = 0;
        currentState = 'READY';
        
        document.body.classList.remove('app-active');
        releaseWakeLock();
        
        renderTime(); 
        updateUI();
        
        startBtn.innerText = 'Start'; 
        startBtn.style.backgroundColor = 'var(--accent-color)'; 
    }

    function finish() {
        clearInterval(timerInterval); 
        playBeep(); 
        setTimeout(playBeep, 400);
        
        currentState = 'READY';
        phaseDisplay.innerText = "DONE!"; 
        phaseDisplay.style.color = "var(--text-color)";
        document.body.style.backgroundColor = "var(--bg-color)";
        roundCounterContainer.style.opacity = '0';
        
        document.body.classList.remove('app-active');
        releaseWakeLock();
        
        isRunning = false; 
        startBtn.innerText = 'Start'; 
        startBtn.style.backgroundColor = 'var(--accent-color)'; 
        timeLeft = undefined;
    }

    // --- Inicialización al Cargar la Página ---
    renderPhaseInputs(); 
    loadSavedRoutines(); 
    resetTimer();
</script>
</body>
</html>
