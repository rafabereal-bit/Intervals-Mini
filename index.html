<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temporizador Pro</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --card-bg: #ffffff;
            --work-bg: #e3f2fd;
            --rest-bg: #e8f5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 1rem 2rem;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0.5rem;
        }

        .sound-toggle {
            background: rgba(0,0,0,0.05);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Timer - El Centro de Atención */
        .timer-hero {
            text-align: center;
            padding: 4rem 1rem;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 350px;
        }

        .time-display {
            font-size: 8rem; /* Tamaño masivo */
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            margin: 1rem 0;
        }

        .phase-label {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .set-counter {
            font-size: 1.1rem;
            color: #86868b;
            font-weight: 500;
        }

        /* Botones Principales */
        .controls-main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1rem;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 1.2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.97); }

        .btn-start { background: var(--accent-color); color: white; }
        .btn-reset { background: #e5e5ea; color: var(--text-color); }

        /* Configuración y Rutinas */
        .section-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 80px;
            align-items: center;
            gap: 1rem;
        }

        .input-row input {
            padding: 0.8rem;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
        }

        .input-row input[type="text"] { text-align: left; width: 100%; }

        /* Rutinas Guardadas */
        .saved-routines {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .routine-chip {
            background: #f5f5f7;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid #d2d2d7;
            cursor: pointer;
        }

        /* Notas */
        .notes-area {
            width: 100%;
            height: 150px;
            padding: 1.2rem;
            border-radius: 24px;
            border: none;
            background: var(--card-bg);
            font-size: 1rem;
            resize: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        h2 { font-size: 1.2rem; margin-bottom: 0.5rem; padding-left: 0.5rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="font-weight: 700; font-size: 1.2rem;">TEMPO</h1>
        <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">🔊</button>
    </div>

    <div class="timer-hero" id="heroCard">
        <div class="set-counter">Ronda <span id="currentSet">1</span> / <span id="totalSetsDisp">8</span></div>
        <div class="time-display" id="timeDisplay">01:00</div>
        <div class="phase-label" id="phaseDisplay">PREPARADO</div>
    </div>

    <div class="controls-main">
        <button class="btn-reset" onclick="resetTimer()">Reiniciar</button>
        <button class="btn-start" id="startBtn" onclick="toggleTimer()">Iniciar</button>
    </div>

    <div class="section-card">
        <h2>Personalizar Intervalos</h2>
        <div class="input-row">
            <input type="text" id="label1" placeholder="Nombre fase 1" value="Fase 1">
            <input type="number" id="time1" value="1" min="1">
        </div>
        <div class="input-row">
            <input type="text" id="label2" placeholder="Nombre fase 2" value="Fase 2">
            <input type="number" id="time2" value="2" min="1">
        </div>
        <div class="input-row">
            <span>Repeticiones</span>
            <input type="number" id="sets" value="8" min="1">
        </div>
        <button class="btn-reset" style="background: #34c759; color: white;" onclick="saveRoutine()">Guardar esta rutina</button>
        
        <div id="routineList" class="saved-routines">
            </div>
    </div>

    <div>
        <h2>Notes</h2>
        <textarea id="notepad" class="notes-area" placeholder="Anota aquí tus detalles..."></textarea>
    </div>
</div>

<script>
    let isRunning = false;
    let isPhase1 = true;
    let timerInterval;
    let timeLeft;
    let currentSet = 1;
    let soundEnabled = true;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const timeDisplay = document.getElementById('timeDisplay');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const startBtn = document.getElementById('startBtn');
    const heroCard = document.getElementById('heroCard');
    const notepad = document.getElementById('notepad');

    // Inicialización y Notas
    if(localStorage.getItem('notes')) notepad.value = localStorage.getItem('notes');
    notepad.addEventListener('input', () => localStorage.setItem('notes', notepad.value));
    
    function loadSavedRoutines() {
        const routines = JSON.parse(localStorage.getItem('myRoutines') || '[]');
        const container = document.getElementById('routineList');
        container.innerHTML = '';
        routines.forEach((r, index) => {
            const btn = document.createElement('div');
            btn.className = 'routine-chip';
            btn.innerText = r.name;
            btn.onclick = () => applyRoutine(r);
            container.appendChild(btn);
        });
    }

    function saveRoutine() {
        const name = prompt("Nombre para esta rutina:");
        if (!name) return;
        const r = {
            name: name,
            l1: document.getElementById('label1').value,
            t1: document.getElementById('time1').value,
            l2: document.getElementById('label2').value,
            t2: document.getElementById('time2').value,
            s: document.getElementById('sets').value
        };
        const routines = JSON.parse(localStorage.getItem('myRoutines') || '[]');
        routines.push(r);
        localStorage.setItem('myRoutines', JSON.stringify(routines));
        loadSavedRoutines();
    }

    function applyRoutine(r) {
        document.getElementById('label1').value = r.l1;
        document.getElementById('time1').value = r.t1;
        document.getElementById('label2').value = r.l2;
        document.getElementById('time2').value = r.t2;
        document.getElementById('sets').value = r.s;
        resetTimer();
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.getElementById('soundBtn').innerText = soundEnabled ? '🔊' : '🔇';
    }

    function playBeep() {
        if (!soundEnabled) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerInterval);
            startBtn.innerText = 'Reanudar';
            startBtn.style.backgroundColor = '#34c759';
            isRunning = false;
        } else {
            if (timeLeft === undefined) {
                timeLeft = parseInt(document.getElementById('time1').value) * 60;
                isPhase1 = true;
                updateUI();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) {
                    playBeep();
                    switchPhase();
                }
                renderTime();
            }, 1000);
            startBtn.innerText = 'Pausar';
            startBtn.style.backgroundColor = '#ff3b30';
            isRunning = true;
        }
    }

    function switchPhase() {
        const t1 = parseInt(document.getElementById('time1').value) * 60;
        const t2 = parseInt(document.getElementById('time2').value) * 60;
        const totalSets = parseInt(document.getElementById('sets').value);

        if (isPhase1) {
            isPhase1 = false;
            timeLeft = t2;
        } else {
            if (currentSet >= totalSets) {
                finish();
                return;
            }
            isPhase1 = true;
            currentSet++;
            timeLeft = t1;
        }
        updateUI();
    }

    function updateUI() {
        const l1 = document.getElementById('label1').value || "Fase 1";
        const l2 = document.getElementById('label2').value || "Fase 2";
        const totalSets = document.getElementById('sets').value;

        document.getElementById('currentSet').innerText = currentSet;
        document.getElementById('totalSetsDisp').innerText = totalSets;
        
        if (isPhase1) {
            phaseDisplay.innerText = l1;
            document.body.style.backgroundColor = "var(--work-bg)";
        } else {
            phaseDisplay.innerText = l2;
            document.body.style.backgroundColor = "var(--rest-bg)";
        }
    }

    function renderTime() {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}`;
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        timeLeft = undefined;
        currentSet = 1;
        isPhase1 = true;
        renderTime();
        phaseDisplay.innerText = "PREPARADO";
        document.body.style.backgroundColor = "var(--bg-color)";
        startBtn.innerText = 'Iniciar';
        startBtn.style.backgroundColor = 'var(--accent-color)';
        updateUI();
    }

    function finish() {
        clearInterval(timerInterval);
        playBeep();
        setTimeout(playBeep, 400);
        phaseDisplay.innerText = "¡HECHO!";
        document.body.style.backgroundColor = "var(--bg-color)";
        isRunning = false;
        startBtn.innerText = 'Iniciar';
    }

    loadSavedRoutines();
    resetTimer();
</script>
</body>
</html>
